<!doctype html>
<html>
  <head>
    <title>hbo max</title>

    <style>
      body {
        background: linear-gradient(
          135deg,
          #0b0b0f 0%,
          #2b0a3d 40%,
          #4b1fa6 100%
        );
        color: white;
        font-family: Arial;
      }

      /* 🎬 GRID STYLE HBO (solo contenido) */
      .container {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 🔥 2 columnas fijas */
        grid-template-rows: repeat(2, auto); /* 🔥 2 filas */
        gap: 20px;
        padding: 20px;
        max-width: 500px; /* opcional: para que no se expanda */
        margin: auto;
      }

      .card {
        background: linear-gradient(
          135deg,
          #1a0b2e 0%,
          #120818 50%,
          #0b0b14 100%
        );
        border: 1px solid #2a1450;
        border-radius: 14px;
        overflow: hidden;
        transition: 0.3s;
        cursor: pointer;
        color: white;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
      }
      .card:hover {
        transform: scale(1.08);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }

      .card img {
        width: 100%;
        height: 260px;
        object-fit: cover;
      }
      .content {
        background-color: transparent; /* 🔥 evita fondo blanco interno */
        padding: 10px;
      }
      .title {
        font-weight: 800;
        font-size: 15px;
        color: #ffffff;
        letter-spacing: 0.3px;
      }

      .director {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.75);
      }

      .genres {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
      }
    </style>
  </head>

  <body>
    <!-- 🔥 SOLO NAVBAR -->
    {% include "movies/navbar.html" %}

    <div class="container" id="movies"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        let allMovies = [];
        const container = document.getElementById("movies");
        const genreSelect = document.getElementById("genreFilter");

        function renderMovies(movies) {
          container.innerHTML = "";

          movies.forEach((movie) => {
            const genres = movie.genres_detail.map((g) => g.name).join(", ");

            container.innerHTML += `
        <div class="card">
            <img src="${movie.image}">
            <div class="content">
                <div class="title">
                    ${movie.title}
                </div>

                <div class="director">
                    ${movie.director_detail.name}
                </div>

                <div class="genres">
                    ${genres}
                </div>
            </div>
        </div>
        `;
          });
        }

        /* 🎬 cargar películas */
        fetch("/api/movies/")
          .then((res) => res.json())
          .then((data) => {
            allMovies = data;
            renderMovies(allMovies);
          });

        /* 🏷️ cargar géneros */
        fetch("/api/genres/")
          .then((res) => res.json())
          .then((genres) => {
            genres.forEach((g) => {
              const option = document.createElement("option");
              option.value = g.id;
              option.textContent = g.name;
              genreSelect.appendChild(option);
            });
          });

        /* 🔥 filtrar al cambiar combobox */
        genreSelect.addEventListener("change", function () {
          const genreId = this.value;

          if (genreId === "") {
            renderMovies(allMovies);
            return;
          }

          const filtered = allMovies.filter((movie) =>
            movie.genres.includes(parseInt(genreId)),
          );

          renderMovies(filtered);
        });
      });
    </script>
  </body>
</html>
