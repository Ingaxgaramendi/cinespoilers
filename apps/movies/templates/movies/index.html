<!doctype html>
<html>
  <head>
    <title>Cinespoilers</title>

    <style>
      body {
        background: #0b0b0f;
        color: white;
        font-family: Arial;
      }

      /* 🎬 GRID HBO STYLE */
      .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        padding: 20px;
      }

      /* 🎞️ CARD */
      .card {
        background: #15151e;
        border-radius: 12px;
        overflow: hidden;
        transition: 0.3s;
        cursor: pointer;
      }

      /* 🔥 HOVER EFECTO HBO */
      .card:hover {
        transform: scale(1.08);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }

      /* 🖼️ POSTER */
      .card img {
        width: 100%;
        height: 260px;
        object-fit: cover;
      }

      .content {
        padding: 10px;
      }

      .title {
        font-weight: bold;
        font-size: 14px;
      }

      .director {
        font-size: 12px;
        color: #aaa;
      }

      .genres {
        font-size: 11px;
        color: #888;
      }
    </style>
  </head>

  <body>
    <h1 style="text-align: center; color: #7b5cff">HBO MAX</h1>

    <div class="container" id="movies"></div>

    <script>
      fetch("/api/movies/")
        .then((res) => res.json())
        .then((data) => {
          const container = document.getElementById("movies");

          data.forEach((movie) => {
            const genres = movie.genres_detail.map((g) => g.name).join(", ");

            container.innerHTML += `
        <div class="card">

          <!-- 🖼️ POSTER -->
        <img src="${movie.image || "https://via.placeholder.com/300x450?text=No+Image"}">

          <div class="content">
            <div class="title">${movie.title}</div>

            <div class="director">
               ${movie.director_detail.name}
            </div>

            <div class="genres">
               ${genres}
            </div>
          </div>

        </div>
      `;
          });
        });
    </script>
  </body>
</html>
