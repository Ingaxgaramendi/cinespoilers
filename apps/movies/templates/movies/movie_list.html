<!DOCTYPE html>
<html>
<head>
    <title>Movies</title>
</head>
<body>
    <h1>Movies</h1>

    <ul>
        {% for movie in movies %}
            <li>
                <strong>{{ movie.title }}</strong><br>
                {{ movie.description }}<br>
                {{ movie.release_date }}
            </li>
        {% endfor %}
    </ul>

</body>
</html>
